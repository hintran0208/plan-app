
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern To-Do App</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 450px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 6px 25px rgba(0,0,0,0.1);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        h1 {
            font-weight: 700;
            color: #333;
        }
        #task-counter {
            background-color: #007bff;
            color: white;
            padding: 5px 10px;
            border-radius: 12px;
            font-size: 0.9em;
        }
        .input-group {
            display: flex;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex-grow: 1;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px 0 0 8px;
            outline: none;
            transition: box-shadow 0.3s ease;
        }
        input[type="text"]:focus {
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.25);
        }
        button {
            padding: 15px 25px;
            border: none;
            background: #007bff;
            color: white;
            cursor: pointer;
            border-radius: 0 8px 8px 0;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background: #0056b3;
        }
        .task-list {
            margin-top: 20px;
        }
        .task {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.5s ease;
        }
        .task .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .task .delete-btn:hover {
            background: #c82333;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>To-Do List</h1>
            <span id="task-counter">3 tasks</span>
        </div>
        <div class="input-group">
            <input type="text" id="task-input" placeholder="Add a new task...">
            <button id="add-task-btn">Add</button>
        </div>
        <div id="task-list" class="task-list">
            <div class="task">Finish report <button class="delete-btn">Delete</button></div>
            <div class="task">Call mom <button class="delete-btn">Delete</button></div>
            <div class="task">Go to the gym <button class="delete-btn">Delete</button></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const taskInput = document.getElementById('task-input');
            const addTaskBtn = document.getElementById('add-task-btn');
            const taskList = document.getElementById('task-list');
            const taskCounter = document.getElementById('task-counter');

            const updateTaskCounter = () => {
                const taskCount = taskList.children.length;
                taskCounter.textContent = `${taskCount} task${taskCount !== 1 ? 's' : ''}`;
            };

            const addTask = () => {
                const taskText = taskInput.value.trim();
                if (taskText) {
                    const taskElement = document.createElement('div');
                    taskElement.classList.add('task');
                    taskElement.innerHTML = `${taskText} <button class="delete-btn">Delete</button>`;
                    taskList.appendChild(taskElement);
                    taskInput.value = '';
                    updateTaskCounter();

                    taskElement.querySelector('.delete-btn').addEventListener('click', () => {
                        taskElement.remove();
                        updateTaskCounter();
                    });
                }
            };

            addTaskBtn.addEventListener('click', addTask);
            taskInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    addTask();
                }
            });

            taskList.addEventListener('click', (e) => {
                if (e.target.classList.contains('delete-btn')) {
                    e.target.parentElement.remove();
                    updateTaskCounter();
                }
            });

            updateTaskCounter();
        });
    </script>
</body>
</html>
